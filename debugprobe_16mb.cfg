# 1. Setup the interface
source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 5000

# 2. Setup the RP2040 chip without the automatic flash bank
set CHIPNAME rp2040
source [find target/rp2040.cfg]

# 3. Wipe the default 2MB bank and force-define the 16MB bank
# This uses the 'rp2040' driver which IS in your 0.12.0 build
# but assigns it the 16MB size (0x1000000)
flash bank rp2040.flash rp2040 0x10000000 0x1000000 0 0 rp2040.core0