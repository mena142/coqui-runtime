# debugprobe_16mb.cfg - For Pico DebugProbe + generic 16MB Chinese Pico

# Use the correct DebugProbe interface
source [find interface/cmsis-dap.cfg]

# Important: Tell OpenOCD we're using DebugProbe
transport select swd

# Load the RP2040 target
source [find target/rp2040.cfg]

# Override flash size to 16MB (0x1000000 bytes)
flash bank $_CHIPNAME.flash rp2040 0x10000000 0x1000000 0 $_TARGETNAME

# Work area configuration
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x4000 -work-area-backup 0